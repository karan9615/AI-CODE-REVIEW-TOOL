<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Browser Theme Color (will be updated dynamically by ThemeContext) -->
    <meta name="theme-color" content="#0F0E17" />

    <!-- Mobile Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Set theme color immediately based on saved preference -->
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme") || "dark";
        const themeColor = savedTheme === "dark" ? "#0F0E17" : "#FAFAFF";
        document
          .querySelector('meta[name="theme-color"]')
          .setAttribute("content", themeColor);
      })();
    </script>

    <title>GitLab AI Review</title>
    <style>
      body {
        margin: 0;
        background-color: #0f0e17; /* Match tailwind config background */
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
